name: hookrelay

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: hookrelay
      POSTGRES_PASSWORD: hookrelay
      POSTGRES_DB: hookrelay
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hookrelay -d hookrelay']
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 15

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment: &app-environment
      NODE_ENV: development
      DATABASE_URL: postgresql://hookrelay:hookrelay@postgres:5432/hookrelay?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-only-jwt-secret-change-before-deploying
      API_KEY_PEPPER: local-only-api-key-pepper-change-before-deploying
      WEB_ORIGIN: http://localhost:3000
      API_PORT: 3001
      WEBHOOK_TIMEOUT_MS: 5000
    command: sh -c "corepack pnpm --filter @hookrelay/database migrate:deploy && corepack pnpm --filter @hookrelay/api start"
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment: *app-environment
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
